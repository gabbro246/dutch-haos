name: Sync Dutch source

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - dutch-updated

permissions:
  contents: write

concurrency:
  group: sync-dutch-source
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: gabbro246/dutch
  ADDON_DIR: dutch
  APP_DIR: dutch/app

jobs:
  sync:
    name: Sync upstream Dutch app
    runs-on: ubuntu-latest

    steps:
      - name: Check out add-on repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Dutch source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          path: upstream-dutch

      - name: Copy source and bump add-on version
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          upstream_sha="$(git -C upstream-dutch rev-parse HEAD)"
          short_sha="${upstream_sha:0:12}"
          current_sha=""

          if [[ -f "${ADDON_DIR}/SOURCE_REVISION" ]]; then
            current_sha="$(tr -d '[:space:]' < "${ADDON_DIR}/SOURCE_REVISION")"
          fi

          if [[ "${upstream_sha}" == "${current_sha}" ]]; then
            echo "Dutch source is already synced at ${upstream_sha}."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          current_addon_version="$(node - <<'NODE'
          const fs = require('fs');
          const config = fs.readFileSync('dutch/config.yaml', 'utf8');
          const match = config.match(/^version:\s*["']?([^"'\n]+)["']?/m);
          if (!match) process.exit(1);
          console.log(match[1]);
          NODE
          )"

          rsync -a --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".DS_Store" \
            --exclude="usage.log" \
            upstream-dutch/ "${APP_DIR}/"

          upstream_version="$(node -p "require('./${APP_DIR}/package.json').version")"
          if [[ ! "${upstream_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported upstream version in ${APP_DIR}/package.json: ${upstream_version}" >&2
            exit 1
          fi
          if [[ ! "${current_addon_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported add-on version in ${ADDON_DIR}/config.yaml: ${current_addon_version}" >&2
            exit 1
          fi

          printf '%s\n' "${upstream_sha}" > "${ADDON_DIR}/SOURCE_REVISION"

          addon_version="$(node - "${current_addon_version}" <<'NODE'
          const current = process.argv[2].split('.').map(Number);
          const now = new Date();
          const year = now.getUTCFullYear();
          const month = now.getUTCMonth() + 1;

          if (current[0] === year && current[1] === month) {
            console.log(`${year}.${month}.${current[2] + 1}`);
          } else if (current[0] < year || (current[0] === year && current[1] < month)) {
            console.log(`${year}.${month}.0`);
          } else {
            console.log([current[0], current[1], current[2] + 1].join('.'));
          }
          NODE
          )"

          node - "${addon_version}" "${upstream_version}" "${short_sha}" <<'NODE'
          const fs = require('fs');
          const addonVersion = process.argv[2];
          const appVersion = process.argv[3];
          const shortSha = process.argv[4];

          const configPath = 'dutch/config.yaml';
          const config = fs.readFileSync(configPath, 'utf8')
            .replace(/^version:\s*["']?[^"'\n]+["']?/m, `version: "${addonVersion}"`);
          fs.writeFileSync(configPath, config);

          const packagePath = 'dutch/app/package.json';
          const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          pkg.version = appVersion;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          const lockPath = 'dutch/app/package-lock.json';
          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'));
            lock.version = appVersion;
            if (lock.packages && lock.packages['']) {
              lock.packages[''].version = appVersion;
            }
            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }

          const changelogPath = 'dutch/CHANGELOG.md';
          if (fs.existsSync(changelogPath)) {
            const changelog = fs.readFileSync(changelogPath, 'utf8');
            const appChangelogPath = 'dutch/app/CHANGELOG.md';
            let releaseNotes = '';

            if (fs.existsSync(appChangelogPath)) {
              const appChangelog = fs.readFileSync(appChangelogPath, 'utf8');
              const sections = appChangelog.split(/^##[ \t]+/m).slice(1);
              const versionSection = sections.find((section) => {
                const heading = section.split(/\r?\n/, 1)[0].trim();
                return heading === appVersion;
              });

              if (versionSection) {
                releaseNotes = versionSection.replace(/^[^\r\n]*(?:\r?\n)?/, '').trim();
              }
            }

            const fallback = `- Sync Dutch ${appVersion} source to upstream commit \`${shortSha}\`.`;
            const details = releaseNotes
              ? `- Includes Dutch ${appVersion}.\n${releaseNotes}`
              : fallback;
            const entry = `## ${addonVersion}\n\n${details}\n\n`;
            fs.writeFileSync(changelogPath, changelog.replace(/^# Changelog\n\n/, `# Changelog\n\n${entry}`));
          }
          NODE

          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "version=${addon_version}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${upstream_version}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Commit synced source
        if: steps.sync.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${ADDON_DIR}"

          if git diff --cached --quiet; then
            echo "No files changed after sync."
            exit 0
          fi

          git commit -m "Sync Dutch source ${{ steps.sync.outputs.version }}"
          git push
