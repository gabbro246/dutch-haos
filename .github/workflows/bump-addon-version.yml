name: Bump add-on version

on:
  push:
    branches:
      - main
    paths-ignore:
      - dutch/app/**
      - dutch/SOURCE_REVISION

permissions:
  contents: write

concurrency:
  group: bump-addon-version
  cancel-in-progress: false

jobs:
  bump:
    name: Bump Home Assistant add-on version
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out add-on repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump add-on version if needed
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "${before}" =~ ^0+$ ]]; then
            before="$(git rev-parse "${after}^" 2>/dev/null || true)"
          fi

          if [[ -n "${before}" ]] && git diff -U0 "${before}" "${after}" -- dutch/config.yaml | grep -Eq '^[+-]version:'; then
            echo "The pushed changes already update dutch/config.yaml version."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          addon_version="$(node - <<'NODE'
          const fs = require('fs');
          const configPath = 'dutch/config.yaml';
          const config = fs.readFileSync(configPath, 'utf8');
          const match = config.match(/^version:\s*["']?([^"'\n]+)["']?/m);
          if (!match) {
            console.error('No version field found in dutch/config.yaml');
            process.exit(1);
          }
          const parts = match[1].split('.').map(Number);
          if (parts.length !== 3 || parts.some((part) => !Number.isInteger(part) || part < 0)) {
            console.error(`Unsupported add-on version: ${match[1]}`);
            process.exit(1);
          }
          parts[2] += 1;
          const next = parts.join('.');
          fs.writeFileSync(configPath, config.replace(/^version:\s*["']?[^"'\n]+["']?/m, `version: "${next}"`));
          console.log(next);
          NODE
          )"

          node - "${addon_version}" <<'NODE'
          const fs = require('fs');
          const addonVersion = process.argv[2];
          const changelogPath = 'dutch/CHANGELOG.md';
          if (fs.existsSync(changelogPath)) {
            const changelog = fs.readFileSync(changelogPath, 'utf8');
            const entry = `## ${addonVersion}\n\n- Update the Home Assistant add-on wrapper.\n\n`;
            fs.writeFileSync(changelogPath, changelog.replace(/^# Changelog\n\n/, `# Changelog\n\n${entry}`));
          }
          NODE

          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "version=${addon_version}" >> "${GITHUB_OUTPUT}"

      - name: Commit add-on version bump
        if: steps.bump.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dutch/config.yaml dutch/CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No files changed after version bump."
            exit 0
          fi

          git commit -m "Bump add-on version ${{ steps.bump.outputs.version }}"
          git push
